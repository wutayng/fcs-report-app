<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Launch FCS Dates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

    .chart-header {

    /* Dot + badge */
    .dot-wrapper {

    .dot {

    /* 芒聰聙芒聰聙 States 芒聰聙芒聰聙 */

  </style>
</head>

<script>
// 芒聰聙芒聰聙 Config 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const BOARD_ID  = 18364310005;
const GROUP_ID  = 'topics';
const FCS_COL   = 'date_mm06txhj';
const CONF_COL  = 'numeric_mkz3rvnr';
const AUTO_REFRESH_MS = 5 * 60 * 1000;   // 5 minutes
const MONTHS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// 芒聰聙芒聰聙 Confidence colours 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function confColor(pct) {
  if (pct >= 90) return '#00c875';
  if (pct >= 75) return '#579bfc';
  if (pct >= 60) return '#fdab3d';
  return '#c4c4c4';
}

// 芒聰聙芒聰聙 Saved token (paste your monday.com API token between the quotes below) 芒聰聙芒聰聙芒聰聙芒聰聙
const SAVED_TOKEN = 'REDACTED';

// 芒聰聙芒聰聙 Token management 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function getToken()  { return SAVED_TOKEN || localStorage.getItem('monday_token'); }
function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  localStorage.setItem('monday_token', t);
  document.getElementById('token-modal').classList.remove('open');
  loadData(true);
}
function clearToken() {
  localStorage.removeItem('monday_token');
  document.getElementById('token-input').value = '';
  document.getElementById('token-modal').classList.add('open');
}

// 芒聰聙芒聰聙 API 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function fetchItems(token) {
  const query = `{
    boards(ids: [${BOARD_ID}]) {
      groups(ids: ["${GROUP_ID}"]) {
        items_page(limit: 100) {
          items {
            id name
            column_values(ids: ["${FCS_COL}", "${CONF_COL}"]) { id text }
          }
        }
      }
    }
  }`;

  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': token,
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query })
  });

  if (!res.ok) throw new Error(`HTTP ${res.status} 芒聙聯 check your API token`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors.map(e => e.message).join('; '));

  return json.data.boards[0].groups[0].items_page.items
    .map(item => {
      const fcsText  = item.column_values.find(c => c.id === FCS_COL)?.text  || '';
      const confText = item.column_values.find(c => c.id === CONF_COL)?.text || '';
      return {
        id:         item.id,
        name:       item.name,
        fcsDate:    fcsText  || null,
        confidence: confText ? parseFloat(confText) : null
      };
    })
    .filter(i => i.fcsDate)
    .sort((a, b) => new Date(a.fcsDate) - new Date(b.fcsDate));
}

// 芒聰聙芒聰聙 Date helpers 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function prettyDate(s) {
  return parseDate(s).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function monthStart(d, offset = 0) {
  return new Date(d.getFullYear(), d.getMonth() + offset, 1);
}

// 芒聰聙芒聰聙 Render 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderChart(items) {
  const area = document.getElementById('chart-area');

  if (!items.length) {
    area.innerHTML = '<div class="state-msg">No items with FCS dates found in the Active Developments group.</div>';
    return;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const allDates   = items.map(i => parseDate(i.fcsDate));
  const minDate    = new Date(Math.min(...allDates));
  const maxDate    = new Date(Math.max(...allDates));

  let rangeStart = monthStart(minDate, -1);
  let rangeEnd   = monthStart(maxDate,  2);
  if (today < rangeStart) rangeStart = monthStart(today, -1);
  if (today > rangeEnd)   rangeEnd   = monthStart(today,  2);

  const totalMs = rangeEnd - rangeStart;
  const pct = d => ((d - rangeStart) / totalMs) * 100;

  // Month list
  const monthList = [];
  let cur = new Date(rangeStart);
  while (cur < rangeEnd) {
    monthList.push(new Date(cur));
    cur = monthStart(cur, 1);
  }

  // Label column width
  const cvs = document.createElement('canvas');
  const ctx = cvs.getContext('2d');
  ctx.font = '500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  const labelW = Math.min(220, Math.max(120,
    Math.max(...items.map(i => ctx.measureText(i.name).width)) + 20
  ));

  const todayPct  = pct(today);
  const showToday = todayPct >= 0 && todayPct <= 100;

  // Month ticks HTML
  const monthTicksHtml = monthList.map(m => {
    const p     = pct(m);
    const label = (m.getMonth() === 0 || m === monthList[0])
      ? `${MONTHS[m.getMonth()]} ${m.getFullYear()}`
      : MONTHS[m.getMonth()];
    return `<div class="month-tick" style="left:${p}%">${label}</div>`;
  }).join('');

  const todayTickHtml = showToday
    ? `<div class="today-tick" style="left:${todayPct}%">Today</div>`
    : '';

  // Grid lines per row
  const gridHtml = monthList.map(m =>
    `<div class="grid-line" style="left:${pct(m)}%"></div>`
  ).join('');

  const todayLineHtml = showToday
    ? `<div class="today-line" style="left:${todayPct}%"></div>`
    : '';

  // Item rows
  const rowsHtml = items.map(item => {
    const dp     = pct(parseDate(item.fcsDate));
    const color  = confColor(item.confidence ?? 0);
    const badge  = item.confidence != null ? item.confidence + '%' : '芒聙聰';

    return `
      <div class="item-row">
        <div class="item-label" style="width:${labelW}px" title="${esc(item.name)}">${esc(item.name)}</div>
        <div class="item-track">
          <div class="track-line"></div>
          ${gridHtml}
          ${todayLineHtml}
          <div class="dot-wrapper"
            style="left:${dp}%"
            data-name="${esc(item.name)}"
            data-date="${esc(prettyDate(item.fcsDate))}"
            data-conf="${esc(badge)}"
            data-color="${color}"
            onmouseenter="showTip(event,this)"
            onmouseleave="hideTip()"
            onmousemove="moveTip(event)">
            <div class="conf-badge" style="background:${color}">${badge}</div>
            <div class="dot" style="background:${color}"></div>
          </div>
        </div>
      </div>`;
  }).join('');

  // Legend
  const legendHtml = `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00c875"></div>90芒聙聯100%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#579bfc"></div>75芒聙聯89%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fdab3d"></div>60芒聙聯74%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c4c4c4"></div>&lt;60%</div>
      ${showToday ? '<div class="legend-item"><div style="width:14px;height:2px;background:#e2445c;border-radius:1px"></div>Today</div>' : ''}
    </div>`;

  area.innerHTML = `
    <div class="chart">
      <div class="chart-header">
        <div class="label-spacer" style="width:${labelW}px"></div>
        <div class="months-bar">${monthTicksHtml}${todayTickHtml}</div>
      </div>
      <div class="item-rows">${rowsHtml}</div>
      ${legendHtml}
    </div>`;
}

// 芒聰聙芒聰聙 Tooltip 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function showTip(e, el) {
  document.getElementById('tt-name').textContent      = el.dataset.name;
  document.getElementById('tt-date').textContent      = el.dataset.date;
  document.getElementById('tt-conf-text').textContent = 'Confidence: ' + el.dataset.conf;
  document.getElementById('tt-swatch').style.background = el.dataset.color;
  document.getElementById('tooltip').classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = Math.min(e.clientX + 16, window.innerWidth - 220) + 'px';
  tt.style.top  = Math.max(e.clientY - 10, 8) + 'px';
}
function hideTip() {
  document.getElementById('tooltip').classList.remove('show');
}

// 芒聰聙芒聰聙 Load data + auto-refresh 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
let refreshTimer    = null;
let countdownTimer  = null;
let nextRefreshAt   = null;

async function loadData(manual = false) {
  const token = getToken();
  if (!token) { document.getElementById('token-modal').classList.add('open'); return; }

  const btn = document.getElementById('refresh-btn');
  btn.disabled    = true;
  btn.textContent = '芒聠禄 Loading芒聙娄';

  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  document.getElementById('next-refresh').textContent = '';

  try {
    const items = await fetchItems(token);
    renderChart(items);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    // Schedule next auto-refresh
    nextRefreshAt = Date.now() + AUTO_REFRESH_MS;
    refreshTimer  = setTimeout(() => loadData(), AUTO_REFRESH_MS);

    countdownTimer = setInterval(() => {
      const secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      const m    = Math.floor(secs / 60);
      const s    = secs % 60;
      document.getElementById('next-refresh').textContent =
        `Next refresh ${m}:${String(s).padStart(2, '0')}`;
      if (secs === 0) clearInterval(countdownTimer);
    }, 1000);

  } catch (err) {
    document.getElementById('chart-area').innerHTML = `
      <div class="state-error">
        Failed to load data: ${esc(err.message)}.
        <a href="#" onclick="clearToken();return false">Re-enter API token</a>.
      </div>`;
  } finally {
    btn.disabled    = false;
    btn.textContent = '芒聠禄 Refresh';
  }
}

// 芒聰聙芒聰聙 Utils 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 芒聰聙芒聰聙 Init 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveToken();
});

if (getToken()) {
  loadData();
} else {
  document.getElementById('token-modal').classList.add('open');
  document.getElementById('chart-area').innerHTML =
    '<div class="state-msg">Enter your monday.com API token to get started.</div>';
}
</script>
