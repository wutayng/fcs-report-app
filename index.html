<!DOCTYPE html>

<head>

  <style>

<body>

<script>
// ГўВ”ВЂГўВ”ВЂ Config ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
const BOARD_ID  = 18364310005;
const GROUP_ID  = 'topics';
const FCS_COL   = 'date_mm06txhj';
const CONF_COL  = 'numeric_mkz3rvnr';
const AUTO_REFRESH_MS = 5 * 60 * 1000;   // 5 minutes
const MONTHS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ГўВ”ВЂГўВ”ВЂ Confidence colours ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function confColor(pct) {
  if (pct >= 90) return '#00c875';
  if (pct >= 75) return '#579bfc';
  if (pct >= 60) return '#fdab3d';
  return '#c4c4c4';
}

// ГўВ”ВЂГўВ”ВЂ Saved token (paste your monday.com API token between the quotes below) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
const SAVED_TOKEN = '';

// ГўВ”ВЂГўВ”ВЂ Token management ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function getToken()  { return SAVED_TOKEN || localStorage.getItem('monday_token'); }
function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  localStorage.setItem('monday_token', t);
  document.getElementById('token-modal').classList.remove('open');
  loadData(true);
}
function clearToken() {
  localStorage.removeItem('monday_token');
  document.getElementById('token-input').value = '';
  document.getElementById('token-modal').classList.add('open');
}

// ГўВ”ВЂГўВ”ВЂ API ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
async function fetchItems(token) {
  const query = `{
    boards(ids: [${BOARD_ID}]) {
      groups(ids: ["${GROUP_ID}"]) {
        items_page(limit: 100) {
          items {
            id name
            column_values(ids: ["${FCS_COL}", "${CONF_COL}"]) { id text }
          }
        }
      }
    }
  }`;

  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': token,
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query })
  });

  if (!res.ok) throw new Error(`HTTP ${res.status} - check your API token`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors.map(e => e.message).join('; '));

  return json.data.boards[0].groups[0].items_page.items
    .map(item => {
      const fcsText  = item.column_values.find(c => c.id === FCS_COL)?.text  || '';
      const confText = item.column_values.find(c => c.id === CONF_COL)?.text || '';
      return {
        id:         item.id,
        name:       item.name,
        fcsDate:    fcsText  || null,
        confidence: confText ? parseFloat(confText) : null
      };
    })
    .filter(i => i.fcsDate)
    .sort((a, b) => new Date(a.fcsDate) - new Date(b.fcsDate));
}

// ГўВ”ВЂГўВ”ВЂ Date helpers ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function prettyDate(s) {
  return parseDate(s).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function monthStart(d, offset = 0) {
  return new Date(d.getFullYear(), d.getMonth() + offset, 1);
}

// ГўВ”ВЂГўВ”ВЂ Render ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function renderChart(items) {
  const area = document.getElementById('chart-area');

  if (!items.length) {
    area.innerHTML = '<div class="state-msg">No items with FCS dates found in the Active Developments group.</div>';
    return;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const allDates   = items.map(i => parseDate(i.fcsDate));
  const minDate    = new Date(Math.min(...allDates));
  const maxDate    = new Date(Math.max(...allDates));

  let rangeStart = monthStart(minDate, -1);
  let rangeEnd   = monthStart(maxDate,  2);
  if (today < rangeStart) rangeStart = monthStart(today, -1);
  if (today > rangeEnd)   rangeEnd   = monthStart(today,  2);

  const totalMs = rangeEnd - rangeStart;
  const pct = d => ((d - rangeStart) / totalMs) * 100;

  // Month list
  const monthList = [];
  let cur = new Date(rangeStart);
  while (cur < rangeEnd) {
    monthList.push(new Date(cur));
    cur = monthStart(cur, 1);
  }

  // Label column width вЂ” narrower on mobile
  const isMobile = window.innerWidth < 680;
  const cvs = document.createElement('canvas');
  const ctx = cvs.getContext('2d');
  ctx.font = '500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  const maxLabel = isMobile ? 130 : 220;
  const minLabel = isMobile ? 90  : 120;
  const labelW = Math.min(maxLabel, Math.max(minLabel,
    Math.max(...items.map(i => ctx.measureText(i.name).width)) + 20
  ));

  // Minimum chart width for horizontal scrolling on mobile
  const minChartWidth = Math.max(480, monthList.length * 80) + labelW;

  const todayPct  = pct(today);
  const showToday = todayPct >= 0 && todayPct <= 100;

  // Month ticks HTML
  const monthTicksHtml = monthList.map(m => {
    const p     = pct(m);
    const label = (m.getMonth() === 0 || m === monthList[0])
      ? `${MONTHS[m.getMonth()]} ${m.getFullYear()}`
      : MONTHS[m.getMonth()];
    return `<div class="month-tick" style="left:${p}%">${label}</div>`;
  }).join('');

  const todayTickHtml = showToday
    ? `<div class="today-tick" style="left:${todayPct}%">Today</div>`
    : '';

  // Grid lines per row
  const gridHtml = monthList.map(m =>
    `<div class="grid-line" style="left:${pct(m)}%"></div>`
  ).join('');

  const todayLineHtml = showToday
    ? `<div class="today-line" style="left:${todayPct}%"></div>`
    : '';

  // Item rows
  const rowsHtml = items.map(item => {
    const dp     = pct(parseDate(item.fcsDate));
    const color  = confColor(item.confidence ?? 0);
    const badge  = item.confidence != null ? item.confidence + '%' : '-';

    return `
      <div class="item-row">
        <div class="item-label" style="width:${labelW}px" title="${esc(item.name)}">${esc(item.name)}</div>
        <div class="item-track">
          <div class="track-line"></div>
          ${gridHtml}
          ${todayLineHtml}
          <div class="dot-wrapper"
            style="left:${dp}%"
            data-name="${esc(item.name)}"
            data-date="${esc(prettyDate(item.fcsDate))}"
            data-conf="${esc(badge)}"
            data-color="${color}"
            onmouseenter="showTip(event,this)"
            onmouseleave="hideTip()"
            onmousemove="moveTip(event)"
            onclick="tapTip(event,this)">
            <div class="conf-badge" style="background:${color}">${badge}</div>
            <div class="dot" style="background:${color}"></div>
          </div>
        </div>
      </div>`;
  }).join('');

  // Legend
  const legendHtml = `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00c875"></div>90-100%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#579bfc"></div>75-89%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fdab3d"></div>60-74%</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c4c4c4"></div>&lt;60%</div>
      ${showToday ? '<div class="legend-item"><div style="width:14px;height:2px;background:#e2445c;border-radius:1px"></div>Today</div>' : ''}
    </div>`;

  area.innerHTML = `
    <div class="chart">
      <div class="chart-scroll">
        <div class="chart-inner" style="min-width:${minChartWidth}px; padding: 0 14px;">
          <div class="chart-header">
            <div class="label-spacer" style="width:${labelW}px"></div>
            <div class="months-bar">${monthTicksHtml}${todayTickHtml}</div>
          </div>
          <div class="item-rows">${rowsHtml}</div>
        </div>
      </div>
      ${legendHtml}
    </div>`;
}

// ГўВ”ВЂГўВ”ВЂ Tooltip ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function showTip(e, el) {
  document.getElementById('tt-name').textContent      = el.dataset.name;
  document.getElementById('tt-date').textContent      = el.dataset.date;
  document.getElementById('tt-conf-text').textContent = 'Confidence: ' + el.dataset.conf;
  document.getElementById('tt-swatch').style.background = el.dataset.color;
  document.getElementById('tooltip').classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = Math.min(e.clientX + 16, window.innerWidth - 220) + 'px';
  tt.style.top  = Math.max(e.clientY - 10, 8) + 'px';
}
function hideTip() {
  const tt = document.getElementById('tooltip');
  tt.classList.remove('show');
  tt.classList.remove('mobile-show');
}

// Touch / tap tooltip вЂ” shows as a bottom sheet on mobile
let tapTimer = null;
function tapTip(e, el) {
  if (window.innerWidth >= 680) return; // desktop handles via mouseenter
  e.stopPropagation();
  clearTimeout(tapTimer);
  document.getElementById('tt-name').textContent      = el.dataset.name;
  document.getElementById('tt-date').textContent      = el.dataset.date;
  document.getElementById('tt-conf-text').textContent = 'Confidence: ' + el.dataset.conf;
  document.getElementById('tt-swatch').style.background = el.dataset.color;
  const tt = document.getElementById('tooltip');
  tt.classList.add('show', 'mobile-show');
  tapTimer = setTimeout(hideTip, 3500);
}
// Dismiss tooltip on tap elsewhere
document.addEventListener('click', () => {
  if (window.innerWidth < 680) hideTip();
});

// ГўВ”ВЂГўВ”ВЂ Load data + auto-refresh ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
let refreshTimer    = null;
let countdownTimer  = null;
let nextRefreshAt   = null;

async function loadData(manual = false) {
  const token = getToken();
  if (!token) { document.getElementById('token-modal').classList.add('open'); return; }

  const btn = document.getElementById('refresh-btn');
  btn.disabled    = true;
  btn.textContent = 'Loading...';

  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  document.getElementById('next-refresh').textContent = '';

  try {
    const items = await fetchItems(token);
    renderChart(items);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    // Schedule next auto-refresh
    nextRefreshAt = Date.now() + AUTO_REFRESH_MS;
    refreshTimer  = setTimeout(() => loadData(), AUTO_REFRESH_MS);

    countdownTimer = setInterval(() => {
      const secs = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
      const m    = Math.floor(secs / 60);
      const s    = secs % 60;
      document.getElementById('next-refresh').textContent =
        `Next refresh ${m}:${String(s).padStart(2, '0')}`;
      if (secs === 0) clearInterval(countdownTimer);
    }, 1000);

  } catch (err) {
    document.getElementById('chart-area').innerHTML = `
      <div class="state-error">
        Failed to load data: ${esc(err.message)}.
        <a href="#" onclick="clearToken();return false">Re-enter API token</a>.
      </div>`;
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Refresh';
  }
}

// ГўВ”ВЂГўВ”ВЂ Utils ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ГўВ”ВЂГўВ”ВЂ Init ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveToken();
});

if (getToken()) {
  loadData();
} else {
  document.getElementById('token-modal').classList.add('open');
  document.getElementById('chart-area').innerHTML =
    '<div class="state-msg">Enter your monday.com API token to get started.</div>';
}

// в”Ђв”Ђ Password gate в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const PAGE_PASSWORD = 'btfcs';
function checkPassword() {
  const input = document.getElementById('pw-input');
  const errEl = document.getElementById('pw-error');
  if (input.value === PAGE_PASSWORD) {
    sessionStorage.setItem('page_unlocked', '1');
    document.getElementById('password-gate').classList.remove('show');
    input.classList.remove('error');
    errEl.textContent = '';
  } else {
    input.classList.add('error');
    errEl.textContent = 'Incorrect password. Please try again.';
    input.select();
  }
}
if (sessionStorage.getItem('page_unlocked') === '1') {
  document.getElementById('password-gate').classList.remove('show');
}

</script>
