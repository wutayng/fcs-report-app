name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API token
        env:
          SAVED_TOKEN: ${{ secrets.SAVED_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os
          token = os.environ['SAVED_TOKEN']
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace("const SAVED_TOKEN = '';", f"const SAVED_TOKEN = '{token}';")
          with open('index.html', 'w') as f:
              f.write(content)
          print('Token injected successfully')
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
